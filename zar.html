<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зар мэдээ — КиноЭзэн</title>

<link rel="stylesheet" href="zar-page.css">
<style>
/* ===== ҲНДСЭН СТИЛЬ (services.html-тэй ижил) ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f1a;color:#fff;font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ===== NAVBAR (services.html-тэй ижил) ===== */
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;background:rgba(18,18,30,0.97);backdrop-filter:blur(16px);z-index:1000;gap:8px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1a0a2e,#3b1f6b);border:1.5px solid rgba(74,222,128,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-icon svg{width:22px;height:22px;}
.logo-text{font-size:18px;font-weight:800;background:linear-gradient(90deg,#4ade80,#f4a261);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.nav-desktop-right{display:flex;gap:8px;align-items:center;}
.btn-login{padding:7px 14px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;white-space:nowrap;}
.btn-login:hover{border-color:#4ade80;color:#4ade80;}
.btn-join{padding:7px 14px;border-radius:8px;background:linear-gradient(90deg,#e63946,#f4a261);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.nav-toggle{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 6px;border-radius:8px;flex-shrink:0;line-height:1;}
.nav-drawer{display:none;flex-direction:column;background:rgba(18,18,30,0.99);border-bottom:1px solid rgba(255,255,255,0.08);padding:12px 16px 16px;gap:6px;}
.nav-drawer.open{display:flex;}
.nav-drawer a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:14px;font-weight:600;padding:10px 12px;border-radius:10px;transition:background 0.2s,color 0.2s;}
.nav-drawer a:hover,.nav-drawer a.active{background:rgba(74,222,128,0.08);color:#4ade80;}
.drawer-divider{height:1px;background:rgba(255,255,255,0.07);margin:6px 0;}
.drawer-btns{display:flex;gap:8px;margin-top:4px;}
.drawer-btns .btn-login,.drawer-btns .btn-join{flex:1;text-align:center;}
.nav-links-desktop{display:flex;gap:4px;align-items:center;}
.nav-links-desktop a{color:rgba(255,255,255,0.55);text-decoration:none;font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px;transition:all 0.2s;white-space:nowrap;}
.nav-links-desktop a:hover,.nav-links-desktop a.active{color:#4ade80;background:rgba(74,222,128,0.08);}
@media(max-width:768px){.nav-links-desktop{display:none;}.nav-desktop-right{display:none;}.nav-toggle{display:block;}}

/* ===== HERO ===== */
.hero{position:relative;text-align:center;padding:32px 16px 26px;overflow:hidden;}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;filter:blur(60px);opacity:0.25;z-index:0;pointer-events:none;}
.hero::before{width:280px;height:280px;background:#4ade80;top:-120px;left:10%;animation:zarBlobFloat1 9s ease-in-out infinite;}
.hero::after{width:240px;height:240px;background:#f4a261;top:-100px;right:10%;animation:zarBlobFloat2 11s ease-in-out infinite;}
@keyframes zarBlobFloat1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(30px,20px) scale(1.15);}}
@keyframes zarBlobFloat2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-25px,15px) scale(1.1);}}
.hero h1{position:relative;font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.3;z-index:1;animation:zarHeroIn 0.6s ease both;}
.hero h1 span{color:#4ade80;}
.hero p{position:relative;font-size:13px;color:rgba(255,255,255,0.45);line-height:1.7;max-width:500px;margin:0 auto;z-index:1;animation:zarHeroIn 0.6s ease 0.1s both;}
@keyframes zarHeroIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.hero .zar-megaphone{display:inline-block;animation:zarMegaphoneWiggle 2.6s ease-in-out infinite;}
@keyframes zarMegaphoneWiggle{0%,80%,100%{transform:rotate(0deg);}85%{transform:rotate(-12deg);}90%{transform:rotate(10deg);}95%{transform:rotate(-6deg);}}

/* ===== FOOTER ===== */
.footer{margin-top:30px;padding:16px 18px 80px;border-top:1px solid rgba(255,255,255,0.06);text-align:center;font-size:12px;color:rgba(255,255,255,0.25);}

/* ===== MOBILE BOTTOM NAV ===== */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(18,18,30,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);z-index:1000;padding-bottom:env(safe-area-inset-bottom);}
.mbn-inner{display:flex;align-items:center;justify-content:space-around;height:100%;}
.mbn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 8px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,0.35);font-size:9px;font-weight:600;transition:color 0.2s;border:none;background:none;flex:1;}
.mbn-item.active{color:#4ade80;}
.mbn-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.mbn-item.active svg{stroke:#4ade80;}
@media(max-width:768px){.mobile-bottom-nav{display:flex;}body{padding-bottom:60px;}}

@media(max-width:600px){
  .hero h1{font-size:20px;}
}
</style>
</head>
<body>

    <button class="btn-join" onclick="location.href='login.html'">Бүртгүүлэх</button>
  </div>
</div>

<!-- ===== HERO ===== -->
<div class="hero">
